function partNames(){return Object.keys(parts);}

function calcStats(){
  const names=partNames();
  const sc={};names.forEach(p=>sc[p]={hits:0,earned:0});
  const hist=[];
  let carryOver=0;
  let acumSince=[];

  MX.forEach(m=>{
    const r=res[m.id];
    const apostaron=names.filter(p=>bets[p]&&bets[p][m.id]!=null);
    const monto=matchAmounts[m.id]||BPM_DEFAULT;
    const pozoBase=apostaron.length*monto;
    const pozoTotal=pozoBase+carryOver;

    if(!r)return;

    const winners=apostaron.filter(p=>bets[p][m.id].h===r.h&&bets[p][m.id].a===r.a);

    if(winners.length>0){
      // Verificar si el admin decidió seguir acumulando
      const decision=pozoDecisions[m.id]; // 'cobrar' | 'acumular' | undefined
      
      if(decision==='acumular'){
        // Admin decidió no cobrar, sigue acumulando
        hist.push({m,r,apostaron,winners,pozoBase,pozoTotal,share:0,acum:false,acumDecision:true,carryOver});
        carryOver=pozoTotal;
        acumSince.push({mid:m.id,apostaron,monto});
      } else if(decision==='cobrar'||carryOver===0){
        // Cobrar: repartir
        if(carryOver===0){
          const share=Math.floor(pozoTotal/winners.length);
          winners.forEach(p=>{sc[p].hits++;sc[p].earned+=share;});
          hist.push({m,r,apostaron,winners,pozoBase,pozoTotal,share,acum:false,carryOver,proporcional:false});
        } else {
          const partesAcum=[...acumSince,{mid:m.id,apostaron,monto}];
          const inversion={};
          winners.forEach(p=>{
            inversion[p]=partesAcum.reduce((sum,pa)=>sum+(pa.apostaron.includes(p)?pa.monto:0),0);
          });
          const totalInversion=Object.values(inversion).reduce((a,b)=>a+b,0);
          const shares={};
          winners.forEach(p=>{
            shares[p]=totalInversion>0?Math.floor(pozoTotal*(inversion[p]/totalInversion)):Math.floor(pozoTotal/winners.length);
            sc[p].hits++;sc[p].earned+=shares[p];
          });
          hist.push({m,r,apostaron,winners,pozoBase,pozoTotal,shares,acum:false,carryOver,proporcional:true,inversion});
        }
        carryOver=0;
        acumSince=[];
      } else {
        // Sin decisión aún: hay ganadores con pozo acumulado, pendiente de decisión admin
        hist.push({m,r,apostaron,winners,pozoBase,pozoTotal,share:0,acum:false,pendingDecision:true,carryOver});
        // No modificamos carryOver hasta que el admin decida
      }
    } else {
      hist.push({m,r,apostaron,winners:[],pozoBase,pozoTotal,share:0,acum:true,carryOver});
      carryOver=pozoTotal;
      acumSince.push({mid:m.id,apostaron,monto});
    }
  });
  return {sc,hist,carryOver};
}

function unreadMatch(){

    const lr=lastReadMatch[mid]||0;
    t+=Object.values(matchComments[mid]).filter(c=>c.author!==me&&c.ts>lr).length;
  });
  return t;
}

function refreshHeader(){

window.sw=function(panel,el){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  if(panel==='adm')pAdm();
  else if(panel==='bet')pBet();
  else if(panel==='ver')pVer();
  else if(panel==='tbl')pTbl();
  else if(panel==='chat'){lastReadChat=Date.now();pChat();}
  else if(panel==='res')pRes();

window.rBL=function(){
  const pl=getPlayer();
  const s=(document.getElementById('bS')||{}).value||'';
  const gf=(document.getElementById('bG')||{}).value||'';
  if(!pl){setHTML('bL','<div class="card"><div class="empty">Seleccioná un participante.</div></div>');return;}
  if(!pend[pl])pend[pl]={};
  const fx=MX.filter(m=>{
    if(gf&&`Grupo ${m.g}`!==gf)return false;
    if(s&&!m.h.toLowerCase().includes(s.toLowerCase())&&!m.a.toLowerCase().includes(s.toLowerCase()))return false;
    return true;
  });
  const gs=[...new Set(fx.map(m=>m.g))].sort();
  let html='';
  gs.forEach(g=>{
    html+=`<div class="card" style="margin-bottom:8px"><div class="gh">Grupo ${g}</div>`;
    fx.filter(m=>m.g===g).forEach(m=>{
      const ex=bets[pl]&&bets[pl][m.id];
      const pd=pend[pl][m.id];
      const vh=pd!==undefined?pd.h:(ex!==undefined?ex.h:'');
      const va=pd!==undefined?pd.a:(ex!==undefined?ex.a:'');
      const played=!!res[m.id];
      html+=`<div class="mr">
        <div class="md">${m.d}</div>
        <div class="mt">${m.h} <span style="color:#aaa">vs</span> ${m.a}</div>
        <div class="si">
          <input type="number" min="0" max="20" value="${vh}" placeholder="-" ${played?'disabled':''} style="width:40px" oninput="sp('${pl.replace(/'/g,"\\'")}',${m.id},this.value,null)">
          <span class="sep">-</span>
          <input type="number" min="0" max="20" value="${va}" placeholder="-" ${played?'disabled':''} style="width:40px" oninput="sp('${pl.replace(/'/g,"\\'")}',${m.id},null,this.value)">
        </div>
        ${played?`<span class="badge bd">Jugado</span>`:(ex?`<span class="badge bo">OK</span>`:`<span class="badge bp">—</span>`)}
      </div>`;
    });
    html+='</div>';
  });
  setHTML('bL',html||'<div class="card"><div class="empty">No hay partidos.</div></div>');
}

window.sp=function(pl,mid,h,a){
  if(!pend[pl])pend[pl]={};
  if(!pend[pl][mid])pend[pl][mid]={h:'',a:''};
  if(h!==null)pend[pl][mid].h=h;
  if(a!==null)pend[pl][mid].a=a;
}

window.svBets=async function(){
  const pl=getPlayer();
  if(!pl){showMsg('bMsg','Seleccioná un participante.','er');return;}
  if(!bets[pl])bets[pl]={};
  let n=0;
  Object.keys(pend[pl]||{}).forEach(mid=>{
    const b=pend[pl][mid];
    if(b.h!==''&&b.a!==''&&b.h!==null&&b.a!==null){bets[pl][mid]={h:parseInt(b.h),a:parseInt(b.a)};n++;}
  });
  pend[pl]={};await svB();rBL();
  showMsg('bMsg',n+' apuesta'+(n!==1?'s':'')+' guardada'+(n!==1?'s':'')+' ✓','ok');
}

  });

  gs.forEach(g=>{
    html+=`<div class="card" style="margin-bottom:8px"><div class="gh">Grupo ${g}</div><div style="overflow-x:auto">
    <table><thead><tr>
      <th style="min-width:130px">Partido</th>
      ${names.map(p=>`<th style="text-align:center;min-width:65px">${p}${p===me?' <span style="font-size:10px;color:#185FA5">(vos)</span>':''}</th>`).join('')}
      <th style="text-align:center">Resultado</th><th></th>
    </tr></thead><tbody>`;
    fx.filter(m=>m.g===g).forEach(m=>{
      const r=res[m.id];
      const mc=matchComments[m.id]?Object.values(matchComments[m.id]):[];
      const isOpen=openComments[m.id];
      const lr=lastReadMatch[m.id]||0;
      const unread=mc.filter(c=>c.author!==me&&c.ts>lr).length;
      html+=`<tr>
        <td style="font-size:12px"><div style="font-weight:500">${m.h} vs ${m.a}</div><div style="font-size:11px;color:#aaa">${m.d}</div></td>
        ${names.map(p=>{
          const b=bets[p]&&bets[p][m.id];
          if(!b)return`<td style="text-align:center"><span class="score-display empty-bet">—</span></td>`;
          const isHit=r&&b.h===r.h&&b.a===r.a;
          const cls=r?(isHit?'hit':'miss'):'';
          return`<td style="text-align:center"><span class="score-display ${cls}">${b.h}-${b.a}</span></td>`;
        }).join('')}
        <td style="text-align:center">${r?`<span class="score-display" style="background:#1a1a1a;color:#fff">${r.h}-${r.a}</span>`:`<span style="font-size:11px;color:#aaa">—</span>`}</td>

      </tr>
      <tr id="cmrow-${m.id}" style="display:${isOpen?'':'none'}">
        <td colspan="${names.length+3}" style="padding:0 6px 10px">
          <div class="match-comments">
            <div id="mclist-${m.id}">
              ${mc.length?mc.sort((a,b)=>a.ts-b.ts).map(c=>`<div class="match-comment-item">
                <span class="match-comment-author">${c.author}:</span>
                <span style="color:#444;margin-left:4px">${c.text}</span>
                <span class="match-comment-time">${fmtTime(c.ts)}</span>
              </div>`).join(''):'<div style="font-size:12px;color:#aaa;padding:4px 0">Sin comentarios aún.</div>'}
            </div>
            <div style="display:flex;gap:6px;margin-top:8px">
              <input type="text" id="mci-${m.id}" placeholder="Comentar este partido..." style="flex:1;font-size:12px" onkeydown="if(event.key==='Enter')sendMC(${m.id})">

            </div>

}

window.toggleCom=function(mid){
  openComments[mid]=!openComments[mid];
  if(openComments[mid]){lastReadMatch[mid]=Date.now();updateBadges();}
  const row=document.getElementById('cmrow-'+mid);
  if(row)row.style.display=openComments[mid]?'':'none';
  const btn=row&&row.previousElementSibling&&row.previousElementSibling.querySelector('.toggle-comments');
  if(btn){
    const mc=matchComments[mid]?Object.values(matchComments[mid]):[];
    btn.innerHTML='💬'+(mc.length?' '+mc.length:'');
  }
}

window.rRL=function(){
  const s=(document.getElementById('rS')||{}).value||'';
  const gf=(document.getElementById('rG')||{}).value||'';
  const sf=(document.getElementById('rSt')||{}).value||'';
  const fx=MX.filter(m=>{
    if(gf&&`Grupo ${m.g}`!==gf)return false;
    if(sf==='p'&&res[m.id])return false;
    if(sf==='d'&&!res[m.id])return false;
    if(s&&!m.h.toLowerCase().includes(s.toLowerCase())&&!m.a.toLowerCase().includes(s.toLowerCase()))return false;
    return true;
  });
  const gs=[...new Set(fx.map(m=>m.g))].sort();
  let html='';
  gs.forEach(g=>{
    html+=`<div class="card" style="margin-bottom:8px"><div class="gh">Grupo ${g}</div>`;
    fx.filter(m=>m.g===g).forEach(m=>{
      const r=res[m.id];
      const apostaron=partNames().filter(p=>bets[p]&&bets[p][m.id]!=null);
      const monto=matchAmounts[m.id]||BPM_DEFAULT;
      html+=`<div class="mr">
        <div class="md">${m.d}</div>
        <div class="mt">${m.h} <span style="color:#aaa">vs</span> ${m.a}
          <span style="font-size:11px;color:#aaa;margin-left:4px">(${apostaron.length} · $${(apostaron.length*monto).toLocaleString('es-AR')})</span>
        </div>
        <div style="display:flex;align-items:center;gap:4px;font-size:12px">
          <span style="color:#888">$</span>
          <input type="number" min="0" value="${monto}" style="width:70px;font-size:12px" id="am${m.id}" placeholder="Monto">
        </div>
        <div class="si">
          <input type="number" min="0" max="20" value="${r?r.h:''}" placeholder="-" style="width:40px" id="rh${m.id}">
          <span class="sep">-</span>
          <input type="number" min="0" max="20" value="${r?r.a:''}" placeholder="-" style="width:40px" id="ra${m.id}">
        </div>
        <button style="font-size:11px;padding:4px 10px" onclick="svRes(${m.id})">${r?'Editar':'Guardar'}</button>
        ${r?`<button style="font-size:11px;padding:4px 8px;color:#aaa" onclick="dlRes(${m.id})">🗑</button>`:''}
        <span class="msg" id="rm${m.id}"></span>
      </div>`;
    });
    html+='</div>';
  });
  setHTML('rL',html||'<div class="card"><div class="empty">No hay partidos.</div></div>');
}

window.svRes=async function(mid){
  const h=(document.getElementById('rh'+mid)||{}).value;
  const a=(document.getElementById('ra'+mid)||{}).value;
  const am=(document.getElementById('am'+mid)||{}).value;
  if(h===''||a===''){alert('Ingresá los dos valores del resultado.');return;}
  res[mid]={h:parseInt(h),a:parseInt(a)};
  if(am&&parseInt(am)>0)matchAmounts[mid]=parseInt(am);
  await svR();await svA();showMsg('rm'+mid,'✓','ok');setTimeout(rRL,900);
}
window.dlRes=async function(mid){

  delete res[mid];await svR();rRL();
}
