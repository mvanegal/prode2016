<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Prode Mundial 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F5F0;color:#1a1a1a;font-size:14px}
.app{max-width:700px;margin:0 auto;padding:12px}
.hdr{background:#fff;border:1px solid #E5E5E0;border-radius:12px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:17px;font-weight:600}
.tabs{display:flex;gap:3px;margin-bottom:10px;background:#fff;border:1px solid #E5E5E0;border-radius:8px;padding:3px}
.tab{flex:1;padding:7px 4px;border:none;background:transparent;border-radius:6px;cursor:pointer;font-size:12px;color:#666;font-family:inherit;transition:all .12s}
.tab.active{background:#F0F0EB;color:#1a1a1a;font-weight:600}
.card{background:#fff;border:1px solid #E5E5E0;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.card h2{font-size:14px;font-weight:600;margin-bottom:10px}
input,select{padding:7px 10px;border:1px solid #E5E5E0;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;font-family:inherit}
input:focus,select:focus{outline:none;border-color:#999}
button{padding:7px 14px;border:1px solid #ccc;border-radius:8px;background:transparent;color:#1a1a1a;cursor:pointer;font-size:12px;font-family:inherit;transition:background .1s}
button:hover{background:#F0F0EB}
.btn-p{border-color:#1a1a1a;font-weight:600}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:60vh}
.login-box{background:#fff;border:1px solid #E5E5E0;border-radius:12px;padding:24px;width:100%;max-width:320px}
.login-box h2{font-size:17px;font-weight:600;margin-bottom:4px;text-align:center}
.login-box p{font-size:12px;color:#666;text-align:center;margin-bottom:16px}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:11px;color:#666;margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select{width:100%}
.gh{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;padding:2px 0;margin:10px 0 4px;border-bottom:1px solid #F0F0EB}
.mr{display:flex;align-items:center;gap:6px;padding:7px 2px;border-bottom:1px solid #F5F5F0;flex-wrap:wrap}
.mr:last-child{border-bottom:none}
.mt{flex:1;font-size:13px;min-width:130px}
.md{font-size:11px;color:#888;min-width:85px}
.si{display:flex;align-items:center;gap:3px}
.si input{width:40px;text-align:center;padding:5px;font-size:14px;font-weight:600}
.sep{font-size:14px;color:#aaa;font-weight:600}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:20px;font-weight:600}
.bp{background:#F0F0EB;color:#888}
.bo{background:#E6F1FB;color:#0C447C}
.bd{background:#EAF3DE;color:#3B6D11}
.ba{background:#FAEEDA;color:#633806}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.sc{background:#F5F5F0;border-radius:8px;padding:10px 12px}
.sl{font-size:11px;color:#888;margin-bottom:2px;font-weight:500}
.sv{font-size:20px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:5px 7px;font-weight:600;color:#888;border-bottom:1px solid #F0F0EB;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
td{padding:6px 7px;border-bottom:1px solid #F5F5F0}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAF7}
.pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#F0F0EB;border-radius:20px;font-size:12px;margin:2px;font-weight:500}
.pill .rm{cursor:pointer;color:#aaa;font-size:16px;line-height:1}
.pill .rm:hover{color:#e00}
.empty{text-align:center;color:#aaa;font-size:13px;padding:20px 0}
.divider{text-align:center;font-size:12px;color:#aaa;margin:12px 0;position:relative}
.divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:#E5E5E0}
.divider span{position:relative;background:#fff;padding:0 10px}
.msg{font-size:12px;margin-left:6px}
.ok{color:#3B6D11}.er{color:#c00}
.fr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.fr input,.fr select{flex:1;min-width:90px}
.hirow td{background:#EEF5FF}
.pot-tag{font-size:11px;color:#888}
.pot-val{font-size:18px;font-weight:700}
.spin{display:inline-block;width:16px;height:16px;border:2px solid #eee;border-top-color:#999;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:60px 20px;color:#aaa;font-size:14px}
@media(max-width:480px){.md{display:none}.mt{min-width:100px}}
</style>
</head>

const GS=[...new Set(MX.map(m=>m.g))].sort();
const APASS="prode2026admin";
const BPM=1000;

let me=null, isAdm=false, parts=[], bets={}, res={}, pend={};

// Escucha cambios en tiempo real
function listenData(callback) {
  onValue(ref(db,'prode'), snap => {
    const d = snap.val() || {};
    parts = d.parts || [];
    bets  = d.bets  || {};
    res   = d.res   || {};
    callback();
  });
}

const svP = () => set(ref(db,'prode/parts'), parts);
const svB = () => set(ref(db,'prode/bets'),  bets);
const svR = () => set(ref(db,'prode/res'),   res);

function calcPot(){
  let t=0;
  MX.forEach(m=>{
    const r=res[m.id]; if(!r) return;
    const w=parts.filter(p=>bets[p]&&bets[p][m.id]&&bets[p][m.id].h===r.h&&bets[p][m.id].a===r.a);
    if(!w.length) t+=parts.length*BPM;
  });
  return t;
}

function setHTML(id,h){const e=document.getElementById(id);if(e)e.innerHTML=h;}
function showMsg(id,t,c){const e=document.getElementById(id);if(!e)return;e.textContent=t;e.className='msg '+(c||'');setTimeout(()=>{if(e)e.textContent='';},2500);}

function showLogin(){
  document.getElementById('R').innerHTML=`
  <div class="hdr"><h1>⚽ Prode Mundial 2026</h1></div>
  <div class="login-wrap"><div class="login-box">
    <h2>Ingresar al prode</h2>
    <p>Elegí tu nombre para cargar tus apuestas</p>
    <div class="fg"><label>Tu nombre</label>
      <select id="lN"><option value="">— Seleccioná —</option>${parts.map(p=>`<option>${p}</option>`).join('')}</select>
    </div>
    <button class="btn-p" style="width:100%;padding:9px" onclick="lgU()">Entrar</button>
    <div class="divider"><span>o</span></div>
    <div class="fg"><label>Contraseña de admin</label>
      <input type="password" id="lP" placeholder="Solo para el admin" onkeydown="if(event.key==='Enter')lgA()">
    </div>
    <button style="width:100%;padding:9px" onclick="lgA()">Entrar como admin</button>
    <div id="lE" style="font-size:12px;color:#c00;text-align:center;margin-top:8px;min-height:14px"></div>
  </div></div>`;
}

window.lgU=function(){const n=document.getElementById('lN').value;if(!n){document.getElementById('lE').textContent='Seleccioná tu nombre.';return;}me=n;isAdm=false;showApp();}
window.lgA=function(){const p=document.getElementById('lP').value;if(p!==APASS){document.getElementById('lE').textContent='Contraseña incorrecta.';return;}me='Admin';isAdm=true;showApp();}
window.lgOut=function(){me=null;isAdm=false;showLogin();}

function showApp(){
  document.getElementById('R').innerHTML=`
  <div class="hdr">
    <h1>⚽ Prode Mundial 2026</h1>
    <div style="text-align:right">
      <div style="display:flex;align-items:center;gap:6px;justify-content:flex-end;margin-bottom:1px;font-size:12px;color:#666">
        ${isAdm?'<span class="badge bo">Admin</span>':''}<strong style="color:#1a1a1a;font-size:13px">${me}</strong>
        <button style="font-size:11px;padding:3px 8px" onclick="lgOut()">Salir</button>
      </div>
      <div class="pot-tag">Pozo acumulado</div>
      <div class="pot-val" id="potVal">$${calcPot().toLocaleString('es-AR')}</div>
    </div>
  </div>
  <div class="tabs">
    ${isAdm?`<button class="tab active" id="t-adm" onclick="sw('adm',this)">⚙ Admin</button>`:''}
    <button class="tab${!isAdm?' active':''}" id="t-bet" onclick="sw('bet',this)">✏ Mis apuestas</button>
    <button class="tab" id="t-tbl" onclick="sw('tbl',this)">📊 Tabla</button>
    ${isAdm?`<button class="tab" id="t-res" onclick="sw('res',this)">✅ Resultados</button>`:''}
  </div>
  <div id="PC"></div>`;
  sw(isAdm?'adm':'bet', document.getElementById(isAdm?'t-adm':'t-bet'));
}

function refreshHeader(){
  const e=document.getElementById('potVal');
  if(e) e.textContent='$'+calcPot().toLocaleString('es-AR');
}

window.sw=function(panel,el){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  if(panel==='adm') pAdm();
  else if(panel==='bet') pBet();
  else if(panel==='tbl') pTbl();
  else if(panel==='res') pRes();
}

function pills(){
  if(!parts.length) return'<span style="font-size:12px;color:#aaa">Sin participantes aún.</span>';
  return parts.map(p=>`<span class="pill">${p}<span class="rm" onclick="rmP('${p.replace(/'/g,"\\'")}')">×</span></span>`).join('');
}

function pAdm(){
  setHTML('PC',`<div class="card"><h2>Participantes (${parts.length})</h2>
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
      <input id="nN" type="text" placeholder="Nombre del participante" style="flex:1;min-width:140px" onkeydown="if(event.key==='Enter')addP()">
      <button class="btn-p" onclick="addP()">+ Agregar</button>
      <span class="msg" id="pMsg"></span>
    </div>
    <div id="pList">${pills()}</div>
  </div>
  <div class="card"><div class="sg">
    <div class="sc"><div class="sl">Participantes</div><div class="sv">${parts.length}</div></div>
    <div class="sc"><div class="sl">Resultados cargados</div><div class="sv">${Object.keys(res).length}/96</div></div>
    <div class="sc"><div class="sl">Partidos totales</div><div class="sv">96</div></div>
    <div class="sc"><div class="sl">Pozo acumulado</div><div class="sv" style="font-size:15px;color:#BA7517">$${calcPot().toLocaleString('es-AR')}</div></div>
  </div></div>`);
}

window.addP=async function(){
  const n=(document.getElementById('nN').value||'').trim();
  if(!n) return;
  if(parts.includes(n)){showMsg('pMsg','Ya existe.','er');return;}
  parts.push(n);
  await svP();
  document.getElementById('nN').value='';
  showMsg('pMsg','Guardado ✓','ok');
}

window.rmP=async function(n){
  if(!confirm('¿Eliminar a '+n+'?')) return;
  parts=parts.filter(p=>p!==n);
  delete bets[n];
  await svP();
  await svB();
}

function getPlayer(){return isAdm?(document.getElementById('bP')||{}).value||'':me;}

function pBet(){
  setHTML('PC',`<div class="card" style="margin-bottom:8px">
    ${isAdm?`<div style="margin-bottom:8px"><select id="bP" onchange="rBL()" style="max-width:220px"><option value="">— Participante —</option>${parts.map(p=>`<option>${p}</option>`).join('')}</select></div>`:''}
    <div class="fr">
      <input type="text" id="bS" placeholder="Buscar equipo..." oninput="rBL()">
      <select id="bG" onchange="rBL()"><option value="">Todos los grupos</option>${GS.map(g=>`<option>Grupo ${g}</option>`).join('')}</select>
    </div>
  </div>
  <div id="bL"></div>
  <div style="display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;padding:0 2px">
    <button class="btn-p" onclick="svBets()">💾 Guardar apuestas</button>
    <span class="msg" id="bMsg"></span>
  </div>`);
  rBL();
}

window.rBL=function(){
  const pl=getPlayer();
  const s=(document.getElementById('bS')||{}).value||'';
  const gf=(document.getElementById('bG')||{}).value||'';
  if(!pl){setHTML('bL','<div class="card"><div class="empty">Seleccioná un participante.</div></div>');return;}
  if(!pend[pl]) pend[pl]={};
  const fx=MX.filter(m=>{
    if(gf&&`Grupo ${m.g}`!==gf) return false;
    if(s&&!m.h.toLowerCase().includes(s.toLowerCase())&&!m.a.toLowerCase().includes(s.toLowerCase())) return false;
    return true;
  });
  const gs=[...new Set(fx.map(m=>m.g))].sort();
  let html='';
  gs.forEach(g=>{
    html+=`<div class="card" style="margin-bottom:8px"><div class="gh">Grupo ${g}</div>`;
    fx.filter(m=>m.g===g).forEach(m=>{
      const ex=bets[pl]&&bets[pl][m.id];
      const pd=pend[pl][m.id];
      const vh=pd!==undefined?pd.h:(ex!==undefined?ex.h:'');
      const va=pd!==undefined?pd.a:(ex!==undefined?ex.a:'');
      const played=!!res[m.id];
      html+=`<div class="mr">
        <div class="md">${m.d}</div>
        <div class="mt">${m.h} <span style="color:#aaa">vs</span> ${m.a}</div>
        <div class="si">
          <input type="number" min="0" max="20" value="${vh}" placeholder="-" ${played?'disabled':''} style="width:40px" oninput="sp('${pl.replace(/'/g,"\\'")}',${m.id},this.value,null)">
          <span class="sep">-</span>
          <input type="number" min="0" max="20" value="${va}" placeholder="-" ${played?'disabled':''} style="width:40px" oninput="sp('${pl.replace(/'/g,"\\'")}',${m.id},null,this.value)">
        </div>
        ${played?`<span class="badge bd">Jugado</span>`:(ex?`<span class="badge bo">OK</span>`:`<span class="badge bp">—</span>`)}
      </div>`;
    });
    html+='</div>';
  });
  setHTML('bL', html||'<div class="card"><div class="empty">No hay partidos.</div></div>');
}

window.sp=function(pl,mid,h,a){
  if(!pend[pl]) pend[pl]={};
  if(!pend[pl][mid]) pend[pl][mid]={h:'',a:''};
  if(h!==null) pend[pl][mid].h=h;
  if(a!==null) pend[pl][mid].a=a;
}

window.svBets=async function(){
  const pl=getPlayer();
  if(!pl){showMsg('bMsg','Seleccioná un participante.','er');return;}
  if(!bets[pl]) bets[pl]={};
  let n=0;
  Object.keys(pend[pl]||{}).forEach(mid=>{
    const b=pend[pl][mid];
    if(b.h!==''&&b.a!==''&&b.h!==null&&b.a!==null){bets[pl][mid]={h:parseInt(b.h),a:parseInt(b.a)};n++;}
  });
  pend[pl]={};
  await svB();
  rBL();
  showMsg('bMsg',n+' apuesta'+(n!==1?'s':'')+' guardada'+(n!==1?'s':'')+' ✓','ok');
}

function pRes(){
  setHTML('PC',`<div class="card" style="margin-bottom:8px">
    <div class="fr">
      <input type="text" id="rS" placeholder="Buscar equipo..." oninput="rRL()">
      <select id="rG" onchange="rRL()"><option value="">Todos los grupos</option>${GS.map(g=>`<option>Grupo ${g}</option>`).join('')}</select>
      <select id="rSt" onchange="rRL()"><option value="">Todos</option><option value="p">Sin resultado</option><option value="d">Con resultado</option></select>
    </div>
  </div><div id="rL"></div>`);
  rRL();
}

window.rRL=function(){
  const s=(document.getElementById('rS')||{}).value||'';
  const gf=(document.getElementById('rG')||{}).value||'';
  const sf=(document.getElementById('rSt')||{}).value||'';
  const fx=MX.filter(m=>{
    if(gf&&`Grupo ${m.g}`!==gf) return false;
    if(sf==='p'&&res[m.id]) return false;
    if(sf==='d'&&!res[m.id]) return false;
    if(s&&!m.h.toLowerCase().includes(s.toLowerCase())&&!m.a.toLowerCase().includes(s.toLowerCase())) return false;
    return true;
  });
  const gs=[...new Set(fx.map(m=>m.g))].sort();
  let html='';
  gs.forEach(g=>{
    html+=`<div class="card" style="margin-bottom:8px"><div class="gh">Grupo ${g}</div>`;
    fx.filter(m=>m.g===g).forEach(m=>{
      const r=res[m.id];
      html+=`<div class="mr">
        <div class="md">${m.d}</div>
        <div class="mt">${m.h} <span style="color:#aaa">vs</span> ${m.a}</div>
        <div class="si">
          <input type="number" min="0" max="20" value="${r?r.h:''}" placeholder="-" style="width:40px" id="rh${m.id}">
          <span class="sep">-</span>
          <input type="number" min="0" max="20" value="${r?r.a:''}" placeholder="-" style="width:40px" id="ra${m.id}">
        </div>
        <button style="font-size:11px;padding:4px 10px" onclick="svRes(${m.id})">${r?'Editar':'Guardar'}</button>
        ${r?`<button style="font-size:11px;padding:4px 8px;color:#aaa" onclick="dlRes(${m.id})">🗑</button>`:''}
        <span class="msg" id="rm${m.id}"></span>
      </div>`;
    });
    html+='</div>';
  });
  setHTML('rL', html||'<div class="card"><div class="empty">No hay partidos.</div></div>');
}

window.svRes=async function(mid){
  const h=(document.getElementById('rh'+mid)||{}).value;
  const a=(document.getElementById('ra'+mid)||{}).value;
  if(h===''||a===''){alert('Ingresá los dos valores.');return;}
  res[mid]={h:parseInt(h),a:parseInt(a)};
  await svR();
  showMsg('rm'+mid,'✓','ok');
  setTimeout(rRL,900);
}

window.dlRes=async function(mid){
  if(!confirm('¿Borrar el resultado?')) return;
  delete res[mid];
  await svR();
  rRL();
}

function pTbl(){
  const played=Object.keys(res).length;
  const sc={};parts.forEach(p=>sc[p]={hits:0,earned:0});
  const hist=[];
  MX.forEach(m=>{
    const r=res[m.id]; if(!r) return;
    const pot=parts.length*BPM;
    const w=parts.filter(x=>bets[x]&&bets[x][m.id]&&bets[x][m.id].h===r.h&&bets[x][m.id].a===r.a);
    if(w.length){const sh=Math.floor(pot/w.length);w.forEach(x=>{sc[x].hits++;sc[x].earned+=sh;});hist.push({m,r,w,sh,acum:false});}
    else hist.push({m,r,w:[],sh:0,acum:true});
  });
  const srt=parts.slice().sort((a,b)=>sc[b].hits-sc[a].hits||sc[b].earned-sc[a].earned);
  const th=Object.values(sc).reduce((s,v)=>s+v.hits,0);
  setHTML('PC',`<div class="sg">
    <div class="sc"><div class="sl">Pozo acumulado</div><div class="sv" style="font-size:15px;color:#BA7517">$${calcPot().toLocaleString('es-AR')}</div></div>
    <div class="sc"><div class="sl">Aciertos totales</div><div class="sv">${th}</div></div>
    <div class="sc"><div class="sl">Partidos jugados</div><div class="sv">${played}</div></div>
    <div class="sc"><div class="sl">Participantes</div><div class="sv">${parts.length}</div></div>
  </div>
  <div class="card">
    <h2>Clasificación</h2>
    ${!parts.length||!played?'<div class="empty">Aún no hay resultados cargados.</div>':`
    <table><thead><tr><th>#</th><th>Participante</th><th>Aciertos</th><th>Ganado</th></tr></thead><tbody>
    ${srt.map((p,i)=>`<tr${!isAdm&&p===me?' class="hirow"':''}>
      <td style="font-weight:700;color:#aaa">${i===0&&sc[p].hits>0?'🏆':(i+1)}</td>
      <td>${p}${!isAdm&&p===me?' <span style="font-size:10px;color:#185FA5;font-weight:600">(vos)</span>':''}</td>
      <td style="font-weight:600">${sc[p].hits}</td>
      <td style="font-weight:${sc[p].earned>0?700:400}">$${sc[p].earned.toLocaleString('es-AR')}</td>
    </tr>`).join('')}
    </tbody></table>`}
  </div>
  <div class="card">
    <h2>Historial de partidos</h2>
    ${!hist.length?'<div class="empty">Sin resultados aún.</div>':`
    <table><thead><tr><th>Partido</th><th>Res.</th><th>Ganadores</th><th>Pozo</th></tr></thead><tbody>
    ${hist.slice().reverse().map(row=>`<tr>
      <td style="font-size:11px">${row.m.h} vs ${row.m.a}</td>
      <td style="font-weight:700">${row.r.h}-${row.r.a}</td>
      <td style="font-size:11px;color:#888">${row.acum?'<span class="badge ba">Nadie</span>':row.w.join(', ')}</td>
      <td style="font-size:11px">${row.acum?'<span class="badge ba">Acumula</span>':`$${row.sh.toLocaleString('es-AR')}`}</td>
    </tr>`).join('')}
    </tbody></table>`}
  </div>`);
}

// Arranca: escucha Firebase y muestra login cuando carguen los datos
listenData(() => {
  refreshHeader();
  // Si ya hay sesión activa, refrescar la vista actual
  if(me) {
    const activeTab = document.querySelector('.tab.active');
    if(activeTab) activeTab.click();
    else showApp();
  } else {
    showLogin();
  }
});

</script>
