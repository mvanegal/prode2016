input:focus,select:focus,textarea:focus{outline:none;border-color:#999}
button{padding:7px 14px;border:1px solid #ccc;border-radius:8px;background:transparent;color:#1a1a1a;cursor:pointer;font-size:12px;font-family:inherit;transition:background .1s}

// Pozo de un partido = monto del admin × quienes apostaron
function pozoPartido(mid){
  const monto=matchAmounts[mid]||BPM_DEFAULT;
  const apostaron=partNames().filter(p=>bets[p]&&bets[p][mid]!=null);
  return apostaron.length*monto;
}

function calcStats(){
  const names=partNames();
  const sc={};names.forEach(p=>sc[p]={hits:0,nearHits:0,earned:0,invested:0});
  const hist=[];

  MX.forEach(m=>{
    const r=res[m.id];
    const apostaron=names.filter(p=>bets[p]&&bets[p][m.id]!=null);
    const monto=matchAmounts[m.id]||BPM_DEFAULT;
    const pozo=apostaron.length*monto;

    apostaron.forEach(p=>{sc[p].invested+=monto;});

    if(!r)return;

    // 1. Buscar ganadores exactos
    const exactos=apostaron.filter(p=>bets[p][m.id].h===r.h&&bets[p][m.id].a===r.a);

    let winners=[];
    let tipoGanador='exacto';

    if(exactos.length>0){
      winners=exactos;
    } else {
      // 2. Buscar el más aproximado (menor diferencia sumando |h-rh|+|a-ra|)
      let minDiff=Infinity;
      apostaron.forEach(p=>{
        const b=bets[p][m.id];
        const diff=Math.abs(b.h-r.h)+Math.abs(b.a-r.a);
        if(diff<minDiff)minDiff=diff;
      });
      winners=apostaron.filter(p=>{
        const b=bets[p][m.id];
        return Math.abs(b.h-r.h)+Math.abs(b.a-r.a)===minDiff;
      });
      tipoGanador='aproximado';
    }

    // Repartir pozo proporcionalmente según monto apostado
    const totalInv=winners.reduce((sum,p)=>sum+monto,0);
    const shares={};
    winners.forEach(p=>{
      shares[p]=Math.floor(pozo*(monto/totalInv));
      if(tipoGanador==='exacto'){sc[p].hits++;} else {sc[p].nearHits++;}
      sc[p].earned+=shares[p];
    });

    hist.push({m,r,apostaron,winners,pozo,shares,tipoGanador});
  });

  return {sc,hist,carryOver:0};
}

function calcPot(){return calcStats().carryOver;}

    t+=Object.values(matchComments[mid]).filter(c=>c.author!==me&&c.ts>lr).length;

  matchAmounts[mid]=parseInt(v.value);
  await svA();
  showMsg('mm'+mid,'✓','ok');
}

window.addP=async function(){
  const n=(document.getElementById('nN').value||'').trim();
  const pin=(document.getElementById('nPin').value||'').trim();
  if(!n){showMsg('pMsg','Falta el nombre.','er');return;}
  if(!pin){showMsg('pMsg','Falta el PIN.','er');return;}

window.rmP=async function(n){

    ${isAdm?`<div style="margin-bottom:8px"><select id="bP" onchange="rBL()" style="max-width:220px"><option value="">— Participante —</option>${names.map(p=>`<option>${p}</option>`).join('')}</select></div>`:''}

window.rBL=function(){
  const pl=getPlayer();
  const s=(document.getElementById('bS')||{}).value||'';
  const gf=(document.getElementById('bG')||{}).value||'';
  if(!pl){setHTML('bL','<div class="card"><div class="empty">Seleccioná un participante.</div></div>');return;}
  if(!pend[pl])pend[pl]={};
  const fx=MX.filter(m=>{
    if(gf&&`Grupo ${m.g}`!==gf)return false;
    if(s&&!m.h.toLowerCase().includes(s.toLowerCase())&&!m.a.toLowerCase().includes(s.toLowerCase()))return false;
    return true;
  });
  const gs=[...new Set(fx.map(m=>m.g))].sort();
  let html='';
  gs.forEach(g=>{
    html+=`<div class="card" style="margin-bottom:8px"><div class="gh">Grupo ${g}</div>`;
    fx.filter(m=>m.g===g).forEach(m=>{
      const ex=bets[pl]&&bets[pl][m.id];
      const pd=pend[pl][m.id];
      const vh=pd!==undefined?pd.h:(ex!==undefined?ex.h:'');
      const va=pd!==undefined?pd.a:(ex!==undefined?ex.a:'');
      const played=!!res[m.id];
      const disabled=played&&!isAdm;
      const vm=matchAmounts[m.id]||BPM_DEFAULT;
      html+=`<div class="mr">
        <div class="md">${m.d}</div>
        <div class="mt">${m.h} <span style="color:#aaa">vs</span> ${m.a}
          <span style="font-size:11px;color:#aaa;margin-left:4px">$${vm.toLocaleString('es-AR')}</span>
        </div>
        <div class="si">
          <input type="number" min="0" max="20" value="${vh}" placeholder="-" ${disabled?'disabled':''} style="width:40px" oninput="sp('${pl.replace(/'/g,"\\'")}',${m.id},'h',this.value)">
          <span class="sep">-</span>
          <input type="number" min="0" max="20" value="${va}" placeholder="-" ${disabled?'disabled':''} style="width:40px" oninput="sp('${pl.replace(/'/g,"\\'")}',${m.id},'a',this.value)">
        </div>
        ${isAdm&&ex?`<button style="font-size:11px;padding:3px 8px;color:#c00" onclick="borrarApuesta('${pl.replace(/'/g,"\\'")}',${m.id})">🗑</button>`:''}
        ${played?`<span class="badge bd">Jugado</span>`:(ex?`<span class="badge bo">OK</span>`:`<span class="badge bp">—</span>`)}
      </div>`;
    });
    html+='</div>';
  });
  setHTML('bL',html||'<div class="card"><div class="empty">No hay partidos.</div></div>');
}

window.borrarApuesta=async function(pl,mid){
  if(!confirm('¿Borrar la apuesta de '+pl+' para este partido?'))return;
  if(bets[pl])delete bets[pl][mid];
  await svB();rBL();
}

window.sp=function(pl,mid,field,val){
  if(!pend[pl])pend[pl]={};
  if(!pend[pl][mid])pend[pl][mid]={h:'',a:''};
  pend[pl][mid][field]=val;
}

window.svBets=async function(){
  const pl=getPlayer();
  if(!pl){showMsg('bMsg','Seleccioná un participante.','er');return;}
  if(!bets[pl])bets[pl]={};
  let n=0;
  Object.keys(pend[pl]||{}).forEach(mid=>{
    const b=pend[pl][mid];
    if(b.h!==''&&b.a!==''&&b.h!==null&&b.a!==null){
      bets[pl][mid]={h:parseInt(b.h),a:parseInt(b.a)};n++;
    }
  });
  pend[pl]={};await svB();rBL();
  showMsg('bMsg',n+' apuesta'+(n!==1?'s':'')+' guardada'+(n!==1?'s':'')+' ✓','ok');
}

window.rVL=function(){
  const names=partNames();
  const s=(document.getElementById('vS')||{}).value||'';
  const gf=(document.getElementById('vG')||{}).value||'';
  if(!names.length){setHTML('vL','<div class="card"><div class="empty">No hay participantes aún.</div></div>');return;}
  const fx=MX.filter(m=>{
    if(gf&&`Grupo ${m.g}`!==gf)return false;
    if(s&&!m.h.toLowerCase().includes(s.toLowerCase())&&!m.a.toLowerCase().includes(s.toLowerCase()))return false;
    return true;
  });
  const gs=[...new Set(fx.map(m=>m.g))].sort();
  let html='';
  gs.forEach(g=>{
    html+=`<div class="card" style="margin-bottom:8px"><div class="gh">Grupo ${g}</div><div style="overflow-x:auto">
    <table><thead><tr>
      <th style="min-width:120px">Partido</th>
      ${names.map(p=>`<th style="text-align:center;min-width:70px">${p}${p===me?' <span style="font-size:10px;color:#185FA5">(vos)</span>':''}</th>`).join('')}
      <th style="text-align:center">Res.</th><th></th>
    </tr></thead><tbody>`;
    fx.filter(m=>m.g===g).forEach(m=>{
      const r=res[m.id];
      const mc=matchComments[m.id]?Object.values(matchComments[m.id]):[];
      const isOpen=openComments[m.id];
      const lr=lastReadMatch[m.id]||0;
      const unread=mc.filter(c=>c.author!==me&&c.ts>lr).length;
      html+=`<tr>
        <td style="font-size:11px"><div style="font-weight:500">${m.h} vs ${m.a}</div><div style="color:#aaa">${m.d}</div></td>
        ${names.map(p=>{
          const b=bets[p]&&bets[p][m.id];
          if(!b||b.h===undefined)return`<td style="text-align:center"><span class="score-display empty-bet">—</span></td>`;
          const isHit=r&&b.h===r.h&&b.a===r.a;
          const cls=r?(isHit?'hit':'miss'):'';
          return`<td style="text-align:center"><span class="score-display ${cls}">${b.h}-${b.a}</span></td>`;
        }).join('')}
        <td style="text-align:center">${r?`<span class="score-display" style="background:#1a1a1a;color:#fff">${r.h}-${r.a}</span>`:`<span style="font-size:11px;color:#aaa">—</span>`}</td>
        <td><button class="toggle-comments" onclick="toggleCom(${m.id})">💬${unread>0?` <span class="unread">${unread}</span>`:mc.length?' '+mc.length:''}</button></td>
      </tr>
      <tr id="cmrow-${m.id}" style="display:${isOpen?'':'none'}">
        <td colspan="${names.length+3}" style="padding:0 6px 10px">
          <div class="match-comments">
            <div id="mclist-${m.id}">
              ${mc.length?mc.sort((a,b)=>a.ts-b.ts).map(c=>`<div class="match-comment-item">
                <strong>${c.author}:</strong> <span style="color:#444">${c.text}</span>
                <span style="font-size:10px;color:#aaa;margin-left:6px">${fmtTime(c.ts)}</span>
              </div>`).join(''):'<div style="font-size:12px;color:#aaa;padding:4px 0">Sin comentarios aún.</div>'}
            </div>
            <div style="display:flex;gap:6px;margin-top:8px">
              <input type="text" id="mci-${m.id}" placeholder="Comentar este partido..." style="flex:1;font-size:12px" onkeydown="if(event.key==='Enter')sendMC(${m.id})">
              <button style="font-size:11px;padding:4px 10px" onclick="sendMC(${m.id})">Enviar</button>
            </div>
          </div>
        </td>
      </tr>`;
    });
    html+=`</tbody></table></div></div>`;
  });
  setHTML('vL',html||'<div class="card"><div class="empty">No hay partidos.</div></div>');
}

window.toggleCom=function(mid){
  openComments[mid]=!openComments[mid];
  if(openComments[mid]){lastReadMatch[mid]=Date.now();updateBadges();}

  if(row)row.style.display=openComments[mid]?'':'none';
}
window.sendMC=async function(mid){
  const inp=document.getElementById('mci-'+mid);if(!inp)return;
  const txt=inp.value.trim();if(!txt)return;
  await push(ref(db,dbPath('matchComments/'+mid)),{author:me,text:txt,ts:Date.now()});

}

window.rRL=function(){

      const r=res[m.id];

      const apostaron=partNames().filter(p=>bets[p]&&bets[p][m.id]!=null);

        <div class="md">${m.d}</div>

          <input type="number" min="0" max="20" value="${r?r.h:''}" placeholder="-" style="width:40px" id="rh${m.id}">

        ${r?`<button style="font-size:11px;padding:4px 8px;color:#aaa" onclick="dlRes(${m.id})">🗑</button>`:''}

    });
    html+='</div>';
  });

window.svRes=async function(mid){
  const h=(document.getElementById('rh'+mid)||{}).value;
  const a=(document.getElementById('ra'+mid)||{}).value;
  const am=(document.getElementById('am'+mid)||{}).value;
  if(h===''||a===''){alert('Ingresá los dos valores.');return;}
  res[mid]={h:parseInt(h),a:parseInt(a)};
  if(am&&parseInt(am)>0)matchAmounts[mid]=parseInt(am);
  await svR();await svA();showMsg('rm'+mid,'✓','ok');setTimeout(rRL,900);
}
window.dlRes=async function(mid){
  if(!confirm('¿Borrar el resultado?'))return;
  delete res[mid];await svR();rRL();
}

window.decidirPozo=async function(mid,decision){
  pozoDecisions[mid]=decision;await svD();
}

// CHAT
function pChat(){
  const msgs=Object.values(chatMsgs).sort((a,b)=>a.ts-b.ts);
  setHTML('PC',`<div class="card">
    <h2>💬 Chat general</h2>
    <div class="chat-box" id="chatBox">
      ${msgs.length?msgs.map(m=>`
        <div class="chat-msg ${m.author===me?'mine':'other'}">
          <div class="chat-bubble">${m.text}</div>
          <div class="chat-meta">${m.author===me?'Vos':m.author} · ${fmtTime(m.ts)}</div>
        </div>`).join(''):'<div class="empty">¡Nadie comentó aún!</div>'}
    </div>
    <div class="chat-input-row">
      <textarea id="chatInput" placeholder="Escribí un mensaje..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
      <button class="btn-p" onclick="sendChat()" style="padding:8px 14px">Enviar</button>
    </div>
  </div>`);
  const box=document.getElementById('chatBox');
  if(box)box.scrollTop=box.scrollHeight;
  updateBadges();
}
window.sendChat=async function(){
  const inp=document.getElementById('chatInput');if(!inp)return;
  const txt=inp.value.trim();if(!txt)return;
  await push(ref(db,dbPath('chat')),{author:me,text:txt,ts:Date.now()});
  inp.value='';
}

// TABLA
function calcDeudas(hist){
  // Deudas simples por partido: cada perdedor le debe a cada ganador
  // proporcional a lo que ganó cada ganador
  const deudas=[];
  hist.forEach(row=>{
    const monto=matchAmounts[row.m.id]||BPM_DEFAULT;
    const perdedores=row.apostaron.filter(p=>!row.winners.includes(p));
    if(!row.winners.length||!perdedores.length)return;
    perdedores.forEach(deudor=>{
      row.winners.forEach(ganador=>{
        const proporcion=row.shares[ganador]/row.pozo;
        const montoDeuda=Math.round(monto*proporcion);
        if(montoDeuda<=0)return;
        const key=`pago_${row.m.id}_${deudor}__${ganador}`;
        deudas.push({
          mid:row.m.id,
          partido:`${row.m.h} vs ${row.m.a}`,
          de:deudor,
          a:ganador,
          monto:montoDeuda,
          key,
          pagado:!!pozoDecisions[key]
        });
      });
    });
  });
  return deudas;
}

function pTbl(){
  const names=partNames();
  const played=Object.keys(res).length;
  const {sc,hist,carryOver}=calcStats();
  const srt=names.slice().sort((a,b)=>sc[b].earned-sc[a].earned||sc[b].hits-sc[a].hits);
  const th=Object.values(sc).reduce((s,v)=>s+v.hits,0);
  const todasDeudas=calcDeudas(hist);
  const pendientes=todasDeudas.filter(d=>!d.pagado);

  setHTML('PC',`<div class="sg">
    <div class="sc"><div class="sl">Pozo acumulado</div><div class="sv" style="font-size:15px;color:#BA7517">$${carryOver.toLocaleString('es-AR')}</div></div>
    <div class="sc"><div class="sl">Aciertos totales</div><div class="sv">${th}</div></div>
    <div class="sc"><div class="sl">Partidos jugados</div><div class="sv">${played}</div></div>
    <div class="sc"><div class="sl">Participantes</div><div class="sv">${names.length}</div></div>
  </div>
  <div class="card"><h2>Clasificación</h2>
    ${!names.length||!played?'<div class="empty">Aún no hay resultados.</div>':`
    <table><thead><tr><th>#</th><th>Participante</th><th>Exactos</th><th>Aprox.</th><th>Invertido</th><th>Ganado</th></tr></thead><tbody>
    ${srt.map((p,i)=>`<tr${!isAdm&&p===me?' class="hirow"':''}>
      <td style="font-weight:700;color:#aaa">${i===0&&sc[p].earned>0?'🏆':(i+1)}</td>
      <td>${p}${!isAdm&&p===me?' <span style="font-size:10px;color:#185FA5">(vos)</span>':''}</td>
      <td style="font-weight:600">${sc[p].hits}</td>
      <td style="color:#888">${sc[p].nearHits}</td>
      <td style="color:#888">$${sc[p].invested.toLocaleString('es-AR')}</td>
      <td style="font-weight:${sc[p].earned>0?700:400}">$${sc[p].earned.toLocaleString('es-AR')}</td>
    </tr>`).join('')}</tbody></table>`}
  </div>
  <div class="card"><h2>💸 Deudas pendientes</h2>
    ${!played?'<div class="empty">Aún no hay resultados.</div>':
      pendientes.length===0?'<div class="empty">✓ Todas las deudas están saldadas.</div>':
      pendientes.map(d=>`<div class="mr">
        <div style="flex:1;font-size:13px">
          <strong>${d.de}</strong> le debe <strong style="color:#BA7517">$${d.monto.toLocaleString('es-AR')}</strong> a <strong>${d.a}</strong>
          <div style="font-size:11px;color:#aaa">${d.partido}</div>
        </div>
        <button style="font-size:11px;padding:4px 10px;border-color:#3B6D11;color:#3B6D11" onclick="marcarPago('${d.key}',true)">✓ Pagado</button>
      </div>`).join('')
    }
  </div>
  <div class="card"><h2>Historial de partidos</h2>
    ${!hist.length?'<div class="empty">Sin resultados aún.</div>':`
    <table><thead><tr><th>Partido</th><th>Res.</th><th>Pozo</th><th>Ganadores</th></tr></thead><tbody>
    ${hist.slice().reverse().map(row=>`<tr>
      <td style="font-size:11px">${row.m.h} vs ${row.m.a}</td>
      <td style="font-weight:700">${row.r.h}-${row.r.a}</td>
      <td style="font-size:11px;font-weight:600">$${row.pozo.toLocaleString('es-AR')}</td>
      <td style="font-size:11px;color:#888">
        ${row.winners.map(p=>`${p} $${row.shares[p].toLocaleString('es-AR')}`).join(', ')}
        ${row.tipoGanador==='aproximado'?` <span class="badge bp">aprox.</span>`:''}
      </td>
    </tr>`).join('')}</tbody></table>`}
  </div>`);
}

// INIT
window.marcarPago=async function(key,pagado){
  if(pagado){
    pozoDecisions[key]=true;
  } else {
    delete pozoDecisions[key];
  }
  await svD();
  pTbl();
}

window.resetPagos=async function(){
  if(!confirm('¿Restablecer todos los pagos marcados?'))return;
  Object.keys(pozoDecisions).forEach(k=>{if(k.startsWith('pago_'))delete pozoDecisions[k];});
  await svD();
  alert('✓ Pagos restablecidos.');
  pTbl();
}

// INIT
showSala();
</script>
